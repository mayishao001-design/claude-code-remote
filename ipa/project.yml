name: CCRemote
options:
  bundleIdPrefix: com.ccremote
  xcodeVersion: "16.0"
  deploymentTarget:
    iOS: "16.0"
settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  CODE_SIGN_STYLE: Manual
  CODE_SIGN_IDENTITY: ""
  CODE_SIGNING_REQUIRED: "NO"
  CODE_SIGNING_ALLOWED: "NO"

targets:
  CCRemote:
    type: application
    platform: iOS
    sources:
      - CCRemote
    settings:
      INFOPLIST_FILE: CCRemote/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.ccremote.app
    info:
      path: CCRemote/Info.plist
