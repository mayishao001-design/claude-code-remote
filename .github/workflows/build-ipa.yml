name: Build IPA

on:
  push:
    branches: [main]
    paths:
      - 'ipa/**'
      - '.github/workflows/build-ipa.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ipa
          xcodegen generate
          xcodebuild -list -project CCRemote.xcodeproj

      - name: Build .app (unsigned)
        run: |
          cd ipa
          xcodebuild \
            -project CCRemote.xcodeproj \
            -scheme CCRemote \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            -destination "generic/platform=iOS" \
            build 2>&1 | tee xcodebuild.log

          echo "=== exit code: $? ==="

          echo "=== DEBUG: all .app ==="
          find build -name "*.app" -type d

          echo "=== DEBUG: build products tree ==="
          find build/Build/Products -type d -maxdepth 4 2>/dev/null || echo "No products dir"

          echo "=== DEBUG: full built products ==="
          ls -la build/Build/Products/Release-iphoneos/ 2>/dev/null || echo "No release dir"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ipa/xcodebuild.log
          retention-days: 7

      - name: Package IPA
        run: |
          cd ipa
          APP_PATH=$(find build -name "CCRemote.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            find build -type d -name "*.app" 2>/dev/null
            exit 1
          fi
          echo "Found .app at: $APP_PATH"
          echo "=== .app contents ==="
          find "$APP_PATH" -type f | head -20
          echo "=== .app size ==="
          du -sh "$APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          cd Payload && zip -r ../CCRemote.ipa CCRemote.app/ && cd ..
          ls -lh CCRemote.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CCRemote-unsigned
          path: ipa/CCRemote.ipa
          retention-days: 30
          if-no-files-found: error
