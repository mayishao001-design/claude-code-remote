name: Build IPA

on:
  push:
    branches: [main]
    paths:
      - 'ipa/**'
      - '.github/workflows/build-ipa.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo "No iOS SDK found"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ipa
          xcodegen generate
          echo "=== Project contents ==="
          ls -la *.xcodeproj/
          echo "=== Schemes ==="
          xcodebuild -list -project *.xcodeproj

      - name: Build .app (unsigned)
        run: |
          cd ipa
          # Build
          xcodebuild \
            -project CCRemote.xcodeproj \
            -scheme CCRemote \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            -destination "generic/platform=iOS" \
            build 2>&1 || echo "FIRST_ATTEMPT_FAILED"

          # Check output
          echo "=== Build products ==="
          find build -name "*.app" -type d 2>/dev/null || echo "No .app found"

      - name: Package IPA
        run: |
          cd ipa
          APP_PATH=$(find build -name "CCRemote.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            # Try to find any .app
            find / -name "*.app" -maxdepth 6 -type d 2>/dev/null | head -5 || true
            exit 1
          fi
          echo "Found .app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          cd Payload && zip -r ../CCRemote.ipa CCRemote.app/ && cd ..
          ls -lh CCRemote.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CCRemote-unsigned
          path: ipa/CCRemote.ipa
          retention-days: 30
          if-no-files-found: error
