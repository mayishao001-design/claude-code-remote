name: Build IPA

on:
  push:
    branches: [main]
    paths:
      - 'ipa/**'
      - '.github/workflows/build-ipa.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ipa
          xcodegen generate
          echo "=== Generated project ==="
          ls -la CCRemote.xcodeproj/
          xcodebuild -project CCRemote.xcodeproj -list

      - name: Build IPA
        run: |
          cd ipa
          set -o pipefail
          xcodebuild \
            -project CCRemote.xcodeproj \
            -scheme CCRemote \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            build 2>&1 | tee xcodebuild.log

          echo "=== Checking build result ==="
          # 检查 .app 是否生成
          APP_PATH="build/Build/Products/Release-iphoneos/CCRemote.app"
          if [ -d "$APP_PATH" ]; then
            echo "Build SUCCESS - .app found at $APP_PATH"
            # 打包 IPA
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            cd Payload && zip -r ../CCRemote.ipa CCRemote.app/ && cd ..
            ls -lh CCRemote.ipa
          else
            echo "Build FAILED - .app not found"
            # 尝试找任何 .app
            find build -name "*.app" -type d 2>/dev/null
            # 输出最后的错误
            grep -E "(error:|fatal error:|FAILED)" xcodebuild.log | tail -20 || echo "No error patterns found"
            exit 1
          fi

      - name: Upload IPA (unsigned, for TrollStore)
        uses: actions/upload-artifact@v4
        with:
          name: CCRemote-unsigned
          path: ipa/CCRemote.ipa
          retention-days: 30
          if-no-files-found: error
